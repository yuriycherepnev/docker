version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - '3307:3306'
    env_file: .env
    volumes:
      - ./data:/var/lib/mysql
    networks:
      - wpsite
      
  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin
    restart: always
    ports:
      - '8080:80'
    env_file: .env
    networks:
      - wpsite

networks:
  wpsite:
    driver: bridge

